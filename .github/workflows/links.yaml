name: Links

permissions:
  contents: read

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          workingDirectory: content
          args: --exclude-file ../.lycheeignore --accept '..=403,405..' --base-url https://docs.zksync.io .
